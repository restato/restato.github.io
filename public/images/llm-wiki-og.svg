<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki, OpenWiki and OKF interactive field guide</title>
  <desc id="desc">Scattered source files connect to a glowing knowledge core.</desc>
  <defs>
    <radialGradient id="glow" cx="70%" cy="47%" r="48%">
      <stop offset="0" stop-color="#7256e8" stop-opacity=".48"/>
      <stop offset="1" stop-color="#09090d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#fff" stroke-opacity=".07"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#09090d"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g fill="none" stroke="#9b87ff" stroke-opacity=".55">
    <path d="M760 315 930 155M760 315l225 55M760 315 915 500M760 315 590 130" stroke-dasharray="7 8"/>
    <circle cx="760" cy="315" r="135" stroke-opacity=".35"/>
    <circle cx="760" cy="315" r="96" stroke-dasharray="5 7"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="14">
    <g transform="translate(890 125)"><rect width="170" height="64" fill="#111118" stroke="#fff" stroke-opacity=".16"/><text x="18" y="38" fill="#ddd8e8">auth.ts</text></g>
    <g transform="translate(950 338)"><rect width="170" height="64" fill="#111118" stroke="#fff" stroke-opacity=".16"/><text x="18" y="38" fill="#ddd8e8">notes.md</text></g>
    <g transform="translate(860 468)"><rect width="170" height="64" fill="#111118" stroke="#fff" stroke-opacity=".16"/><text x="18" y="38" fill="#ddd8e8">metric.sql</text></g>
    <g transform="translate(505 95)"><rect width="170" height="64" fill="#111118" stroke="#fff" stroke-opacity=".16"/><text x="18" y="38" fill="#ddd8e8">paper.pdf</text></g>
  </g>
  <circle cx="760" cy="315" r="78" fill="#111118" stroke="#ad9cff"/>
  <text x="760" y="303" text-anchor="middle" fill="#8c8794" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" letter-spacing="3">LLM</text>
  <text x="760" y="344" text-anchor="middle" fill="#f4f0e8" font-family="Georgia, serif" font-size="39" letter-spacing="5">WIKI</text>
  <text x="70" y="86" fill="#9b87ff" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" letter-spacing="3">INTERACTIVE FIELD GUIDE / 001</text>
  <text x="70" y="196" fill="#f4f0e8" font-family="Arial, sans-serif" font-size="66" font-weight="600" letter-spacing="-4">Make knowledge</text>
  <text x="70" y="268" fill="#f4f0e8" font-family="Arial, sans-serif" font-size="66" font-weight="600" letter-spacing="-4">compound.</text>
  <text x="70" y="344" fill="#aaa6b2" font-family="Arial, sans-serif" font-size="22">LLM Wiki is the idea.</text>
  <text x="70" y="380" fill="#aaa6b2" font-family="Arial, sans-serif" font-size="22">OpenWiki is the tool.</text>
  <text x="70" y="416" fill="#aaa6b2" font-family="Arial, sans-serif" font-size="22">OKF is the portable format.</text>
