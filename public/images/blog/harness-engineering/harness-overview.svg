<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" rx="12" fill="url(#bg)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Claude Code Harness Architecture</text>

  <!-- You (Developer) -->
  <rect x="30" y="180" width="120" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="207" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">You</text>
  <text x="90" y="225" text-anchor="middle" font-size="11" fill="#3b82f6">(Developer)</text>

  <!-- Harness Layer -->
  <rect x="200" y="70" width="380" height="370" rx="12" fill="#faf5ff" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="390" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">Harness Layer</text>

  <!-- CLAUDE.md -->
  <rect x="225" y="115" width="150" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="300" y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">CLAUDE.md</text>
  <text x="300" y="153" text-anchor="middle" font-size="10" fill="#7c3aed">Context &amp; Rules</text>

  <!-- Settings -->
  <rect x="405" y="115" width="150" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">settings.json</text>
  <text x="480" y="153" text-anchor="middle" font-size="10" fill="#7c3aed">Permissions &amp; Config</text>

  <!-- Hooks -->
  <rect x="225" y="185" width="150" height="50" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="300" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="#be185d">Hooks</text>
  <text x="300" y="223" text-anchor="middle" font-size="10" fill="#db2777">Auto Actions</text>

  <!-- Skills -->
  <rect x="405" y="185" width="150" height="50" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="480" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="#be185d">Skills</text>
  <text x="480" y="223" text-anchor="middle" font-size="10" fill="#db2777">Reusable Workflows</text>

  <!-- Commands -->
  <rect x="225" y="255" width="150" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="300" y="277" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Commands</text>
  <text x="300" y="293" text-anchor="middle" font-size="10" fill="#16a34a">Custom Shortcuts</text>

  <!-- MCP Servers -->
  <rect x="405" y="255" width="150" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="480" y="277" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">MCP Servers</text>
  <text x="480" y="293" text-anchor="middle" font-size="10" fill="#16a34a">External Tools</text>

  <!-- Claude Code Agent -->
  <rect x="260" y="330" width="260" height="50" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="2"/>
  <text x="390" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="white">Claude Code Agent</text>

  <!-- Codebase -->
  <rect x="640" y="180" width="130" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="705" y="207" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Codebase</text>
  <text x="705" y="225" text-anchor="middle" font-size="11" fill="#d97706">Files &amp; Code</text>

  <!-- Arrows -->
  <line x1="150" y1="210" x2="195" y2="210" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="355" x2="640" y2="280" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="240" x2="580" y2="355" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- Bottom labels -->
  <text x="400" y="465" text-anchor="middle" font-size="11" fill="#64748b">The harness sits between you and the AI agent, shaping its behavior automatically</text>
  <text x="400" y="483" text-anchor="middle" font-size="11" fill="#94a3b8">No manual instructions needed for each session - the harness handles it</text>
</svg>