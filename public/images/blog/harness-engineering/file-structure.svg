<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace">
  <rect width="800" height="520" rx="12" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="12" fill="#313244"/>
  <rect y="24" width="800" height="12" fill="#313244"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="400" y="22" text-anchor="middle" font-size="12" fill="#cdd6f4">Claude Code Harness File Structure</text>

  <!-- Content -->
  <text x="30" y="70" font-size="13" fill="#89b4fa" font-weight="700">Project Root</text>

  <text x="30" y="95" font-size="12" fill="#a6e3a1">CLAUDE.md</text>
  <text x="300" y="95" font-size="11" fill="#6c7086">// Project context, rules, conventions</text>

  <text x="30" y="120" font-size="12" fill="#89b4fa">.claude/</text>

  <text x="60" y="145" font-size="12" fill="#f9e2af">settings.json</text>
  <text x="300" y="145" font-size="11" fill="#6c7086">// Permissions + hook definitions</text>

  <text x="60" y="170" font-size="12" fill="#f9e2af">settings.local.json</text>
  <text x="300" y="170" font-size="11" fill="#6c7086">// Personal overrides (gitignored)</text>

  <text x="60" y="200" font-size="12" fill="#89b4fa">commands/</text>
  <text x="300" y="200" font-size="11" fill="#6c7086">// Custom slash commands</text>

  <text x="90" y="225" font-size="12" fill="#cba6f7">test.md</text>
  <text x="300" y="225" font-size="11" fill="#6c7086">// /test - run project tests</text>

  <text x="90" y="250" font-size="12" fill="#cba6f7">review.md</text>
  <text x="300" y="250" font-size="11" fill="#6c7086">// /review - code review checklist</text>

  <text x="90" y="275" font-size="12" fill="#cba6f7">deploy.md</text>
  <text x="300" y="275" font-size="11" fill="#6c7086">// /deploy - deployment workflow</text>

  <!-- Separator -->
  <line x1="30" y1="300" x2="770" y2="300" stroke="#45475a" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="30" y="325" font-size="13" fill="#89b4fa" font-weight="700">User Home (~/.claude/)</text>

  <text x="30" y="355" font-size="12" fill="#f9e2af">settings.json</text>
  <text x="300" y="355" font-size="11" fill="#6c7086">// Global permissions + hooks</text>

  <text x="30" y="385" font-size="12" fill="#89b4fa">commands/</text>
  <text x="300" y="385" font-size="11" fill="#6c7086">// Global slash commands</text>

  <text x="60" y="410" font-size="12" fill="#cba6f7">commit.md</text>
  <text x="300" y="410" font-size="11" fill="#6c7086">// /commit - works in any project</text>

  <!-- Legend -->
  <rect x="30" y="445" width="740" height="55" rx="8" fill="#313244"/>
  <circle cx="55" cy="470" r="5" fill="#89b4fa"/>
  <text x="70" y="474" font-size="11" fill="#cdd6f4">Directory</text>
  <circle cx="175" cy="470" r="5" fill="#f9e2af"/>
  <text x="190" y="474" font-size="11" fill="#cdd6f4">Config File</text>
  <circle cx="305" cy="470" r="5" fill="#cba6f7"/>
  <text x="320" y="474" font-size="11" fill="#cdd6f4">Command</text>
  <circle cx="425" cy="470" r="5" fill="#a6e3a1"/>
  <text x="440" y="474" font-size="11" fill="#cdd6f4">Context File</text>

  <text x="55" y="492" font-size="10" fill="#6c7086">Project-level configs override global configs. settings.local.json overrides settings.json.</text>
</svg>