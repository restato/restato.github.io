<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Effort Breakdown Chart for Manual vs AutoResearch</title>
  <desc id="desc">Bar chart comparing manual workflow and automated workflow time distribution.</desc>
  <defs>
    <style>
      .bg { fill: #020617; }
      .axis { stroke: #64748b; stroke-width: 2; }
      .grid { stroke: #1e293b; stroke-width: 1; }
      .label { fill: #cbd5e1; font: 500 16px 'Inter', Arial, sans-serif; }
      .title { fill: #e2e8f0; font: 700 34px 'Inter', Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 500 18px 'Inter', Arial, sans-serif; }
      .manual { fill: #f97316; }
      .auto { fill: #22c55e; }
      .legend { fill: #e2e8f0; font: 600 16px 'Inter', Arial, sans-serif; }
      .value { fill: #e2e8f0; font: 600 14px 'Inter', Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" />
  <text class="title" x="60" y="64">Estimated Analyst Effort per Research Task</text>
  <text class="subtitle" x="60" y="96">Illustrative comparison: manual process vs AutoResearch-assisted workflow</text>

  <line class="axis" x1="120" y1="620" x2="1100" y2="620" />
  <line class="axis" x1="120" y1="140" x2="120" y2="620" />

  <line class="grid" x1="120" y1="540" x2="1100" y2="540" />
  <line class="grid" x1="120" y1="460" x2="1100" y2="460" />
  <line class="grid" x1="120" y1="380" x2="1100" y2="380" />
  <line class="grid" x1="120" y1="300" x2="1100" y2="300" />
  <line class="grid" x1="120" y1="220" x2="1100" y2="220" />

  <text class="label" x="70" y="625">0h</text>
  <text class="label" x="64" y="545">2h</text>
  <text class="label" x="64" y="465">4h</text>
  <text class="label" x="64" y="385">6h</text>
  <text class="label" x="64" y="305">8h</text>
  <text class="label" x="56" y="225">10h</text>

  <rect class="manual" x="190" y="220" width="100" height="400" rx="8" />
  <rect class="auto" x="310" y="460" width="100" height="160" rx="8" />
  <text class="value" x="216" y="210">10h</text>
  <text class="value" x="338" y="450">4h</text>
  <text class="label" x="178" y="650">Discovery</text>

  <rect class="manual" x="500" y="300" width="100" height="320" rx="8" />
  <rect class="auto" x="620" y="500" width="100" height="120" rx="8" />
  <text class="value" x="530" y="290">8h</text>
  <text class="value" x="646" y="490">3h</text>
  <text class="label" x="500" y="650">Reading</text>

  <rect class="manual" x="810" y="380" width="100" height="240" rx="8" />
  <rect class="auto" x="930" y="520" width="100" height="100" rx="8" />
  <text class="value" x="838" y="370">6h</text>
  <text class="value" x="958" y="510">2.5h</text>
  <text class="label" x="802" y="650">Writing</text>

  <rect class="manual" x="860" y="40" width="24" height="24" rx="4" />
  <text class="legend" x="894" y="58">Manual</text>
  <rect class="auto" x="980" y="40" width="24" height="24" rx="4" />
  <text class="legend" x="1014" y="58">AutoResearch-assisted</text>
</svg>
